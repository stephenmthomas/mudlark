body{background:#1a1a1a;color:#e0e0e0;font-family:system-ui,sans-serif;

<script>
// ============================================================
// Mudlark - SVG to UI Framework v0.1.8 — Generated Export
// Delivery: Multi-instance (JS factory)
// Setter:   Mapped (input domain → output range)
//
// API:
//    setMyknob(value)  range: 0–1  →  #svg_1[transform]
//
// State:
//    .getValue('myknob')  .getMin('myknob')  .getMax('myknob')  .getState()

// ============================================================

// ── SVG Template ─────────────────────────────────────────────────────
const MYKNOB_SVG =
`<svg xmlns="http://www.w3.org/2000/svg" width="173" height="173" viewBox="0 0 173 173" fill="none">
<svg id="svg_1" x="2.0" y="2.0" width="169.0" height="169.0" viewBox="2.0 2.0 169.0 169.0" overflow="visible" transform="rotate(0 86.5 86.5)"><circle cx="86.5" cy="86.5" r="84.5" fill="white" stroke="#42393B" stroke-width="4" id="circle_1" style="cursor: ns-resize;"/><path d="M28.1637 144.836C28.0415 144.714 27.9197 144.592 27.7983 144.469L86.5 86.5L28.1637 144.836Z" stroke="#42393B" stroke-width="8" id="path_1"/></svg>

</svg>`;

// ── Binding Definitions ───────────────────────────────────────────────
const MYKNOB_BINDINGS = {
  bind_1: {
    label: 'myKnob',
    fn: 'setMyknob',
    input: { min: 0, max: 1, step: 0.01 },
    targets: [
      { selector: '#svg_1', attr: 'transform', interp: 'linear', outMin: 0, outMax: 270, params: {} }
    ]
  }
};

// ── Factory ───────────────────────────────────────────────────────────
function createMyknob(container) {

  // Stamp SVG — once
  container.innerHTML = MYKNOB_SVG;
  const root = container.querySelector('svg');

  // Resolve all target element refs — once at creation time
  const _r = {};
  _r['tgt_1'] = root.querySelector('#svg_1');

  // ── Bind state (min/max/step written once; val updated by each setter) ──
  root.setAttribute('data-state', JSON.stringify({
    "myknob": {val:0,min:0,max:1,step:0.01}
  }));

  // ── onChange callback — set externally for UI sync ──────────────
  let _onChange = null;


  // ── Named setters (input range per bind) ─────────────────────────
    function setMyknob(value) {
      const _t = Math.max(0, Math.min(1, (value - 0) / 1));
    if(_r['tgt_1']) _r['tgt_1'].setAttribute('transform', "rotate("+(+(0+_t*270).toFixed(4))+" 86.5 86.5)");
      (function(){ var _st={};try{_st=JSON.parse(root.getAttribute('data-state')||'{}');}catch{} if(_st["myknob"])_st["myknob"].val=value; root.setAttribute('data-state',JSON.stringify(_st)); })();
      if(_onChange) _onChange("myknob", value);
    }

  // ── Convenience: drive all binds with one value ───────────────────
  function setAll(value) {
      setMyknob(value);
  }

  // ── Event reactions ──
  // ── Drag inputs ──
  (function(){
    var _svg=root.querySelector('svg')||root;
    var _val=0;
    root.querySelectorAll("#circle_1").forEach(function(_el){
      _el.style.cursor='ns-resize';
      _el.addEventListener('pointerdown',function(_e){
        _e.preventDefault();_el.setPointerCapture(_e.pointerId);
        var _sx=_e.clientX,_sy=_e.clientY,_sv=_val;
        function _mv(_me){
          var _delta=-(_me.clientY-_sy)/200;
          _val=Math.max(0,Math.min(1,_sv+_delta*1*1));
          setMyknob(_val);
        }
        function _up(){
          _el.releasePointerCapture(_e.pointerId);
          _el.removeEventListener('pointermove',_mv);
          _el.removeEventListener('pointerup',_up);
        }
        _el.addEventListener('pointermove',_mv);
        _el.addEventListener('pointerup',_up);
      });
    });
  })();

  // ── Initialize to zero state ──────────────────────────────────────
  setAll(0);

  return {
    setMyknob,
    getState: () => { try{ return JSON.parse(root.getAttribute('data-state')||'{}'); }catch{ return {}; } },
    getValue_myknob: () => { try{ return JSON.parse(root.getAttribute('data-state')||'{}')["myknob"]?.val??null; }catch{ return null; } },
    getMin_myknob:   () => { try{ return JSON.parse(root.getAttribute('data-state')||'{}')["myknob"]?.min??null; }catch{ return null; } },
    getMax_myknob:   () => { try{ return JSON.parse(root.getAttribute('data-state')||'{}')["myknob"]?.max??null; }catch{ return null; } },
    _root: root,
    setAll,
    reset: () => setAll(0),
    set onChange(fn){ _onChange=fn; }
  };
}

// ── Usage ─────────────────────────────────────────────────────────────
// const meter1 = createMyknob(document.getElementById('mount-1'));
// const meter2 = createMyknob(document.getElementById('mount-2'));
// meter1.setMyknob(75);
// meter2.setAll(40);
const instances = [];
for(var _i=1;_i<=3;_i++){
  (function(i){
    var inst = createMyknob(document.getElementById('mount-'+i));
    // Wire onChange: update slider + value readouts bidirectionally
    inst.onChange = function(key, val){
      var display = (+val).toFixed(2);
      var slider = document.getElementById('slider-'+i+'-'+key);
      var readout = document.getElementById('readout-'+i+'-'+key);
      var valEl = document.getElementById('val-'+i+'-'+key);
      if(slider) slider.value = val;
      if(readout) readout.textContent = display;
      if(valEl) valEl.textContent = display;
    };
    // Wire sliders → setters
    document.getElementById('slider-'+i+'-'+'myknob')?.addEventListener('input', function(){ inst.setMyknob(+this.value); });
    instances.push(inst);
  })(_i);
}
